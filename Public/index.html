<!DOCTYPE html>
<html lang="de" class="bg-black text-white antialiased selection:bg-zinc-800">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SNUSDEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Verhindert das "Gummiband"-Ziehen auf iOS */
        body { overscroll-behavior: none; }
        /* Cleaner Font-Look */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<header class="flex justify-between items-center mb-12">
    <h1 class="text-[10px] font-bold text-zinc-100 px-4 py-4">SNUSDEX</h1>
    <span class="text-[10px] text-zinc-500 px-4 py-4">v 1.0.4</span>
</header>
<body>
    //Begrüßungtext
    <div class="p-4 mx-4 mb-12">
        <h2 id="welcome" class="text-2xl font-bold mb-2 font-Inter">Willkommen, DW</h2>
        <p class="text-[10px] text-zinc-400">Hier findest du alle Informationen zu Snus, Marken, Sorten und mehr. Nutze die Navigation unten, um durch die verschiedenen Bereiche zu stöbern.</p>
    </div>


    <footer>
    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-zinc-900 px-6 pb-8 pt-4">
    <div class="flex justify-between items-center max-w-md mx-auto">
        
        <button class="flex flex-col items-center text-white space-y-1">
            <div class="w-5 h-5 border-2 border-white rounded-sm"></div> <span class="text-[9px] font-bold">DEX</span>
        </button>

        <button class="flex flex-col items-center text-zinc-600 space-y-1 hover:text-white transition-colors">
            <div class="w-5 h-5 border-2 border-current rounded-sm"></div>
            <span class="text-[9px] font-bold">SOCIAL</span>
        </button>

        <button class="flex flex-col items-center text-zinc-600 space-y-1 hover:text-white transition-colors">
            <div class="w-5 h-5 border-2 border-current rounded-sm"></div>
            <span class="text-[9px] font-bold">STATS</span>
        </button>

        <button class="flex flex-col items-center text-zinc-600 space-y-1 hover:text-white transition-colors">
            <div class="w-5 h-5 border-2 border-current rounded-sm"></div>
            <span class="text-[9px] font-bold">USER</span>
        </button>

    </div>
    </nav>
    </footer>

    <script src="app.js"></script>
</body>
</html>
